<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eco-Sorter 2026 | Save the Planet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .animate-shake { animation: shake 0.2s ease-in-out 2; }
    body { background: radial-gradient(circle at center, #f8fafc, #e2e8f0); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useCallback } = React;
    const { motion, AnimatePresence } = FramerMotion;

    // 🚩 เปลี่ยน URL ตรงนี้เป็นลิงก์ Web App ที่ได้จาก Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbwVy1shvC4dk_SJnmk0ZnR8amiufwJNGCjQeRnvKSrwtBex87GN3zcUpoAEg2MnMggX/exec";

    const WASTE_POOL = [
      { name: 'Apple', type: 'Organic', icon: '🍎' },
      { name: 'Bottle', type: 'Recyclable', icon: '🧴' },
      { name: 'Battery', type: 'Hazardous', icon: '🔋' },
      { name: 'Can', type: 'Recyclable', icon: '🥫' },
      { name: 'Banana', type: 'Organic', icon: '🍌' },
      { name: 'Light Bulb', type: 'Hazardous', icon: '💡' }
    ];

    function App() {
      const [items, setItems] = useState([]);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(30);
      const [isGameOver, setIsGameOver] = useState(false);
      const [rankings, setRankings] = useState([]);
      const [isShaking, setIsShaking] = useState(false);

      const fetchRankings = useCallback(async () => {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();
          setRankings(data);
        } catch (e) { console.error("API Error", e); }
      }, []);

      const saveScore = async (name) => {
        try {
          const res = await fetch(`${API_URL}?action=save&name=${encodeURIComponent(name)}&score=${score}`);
          const data = await res.json();
          setRankings(data);
        } catch (e) { console.error("Save Error", e); }
      };

      const spawnItem = useCallback(() => {
        const rand = WASTE_POOL[Math.floor(Math.random() * WASTE_POOL.length)];
        return { ...rand, id: Math.random().toString(36).substr(2, 9) };
      }, []);

      useEffect(() => {
        setItems(Array.from({ length: 3 }).map(() => spawnItem()));
        fetchRankings();
      }, [spawnItem, fetchRankings]);

      useEffect(() => {
        if (timeLeft > 0 && !isGameOver) {
          const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
          return () => clearInterval(timer);
        } else if (timeLeft === 0) {
          setIsGameOver(true);
          confetti({ particleCount: 150, spread: 70 });
        }
      }, [timeLeft, isGameOver]);

      const handleSort = (itemId, type) => {
        const item = items.find(i => i.id === itemId);
        if (item.type === type) {
          setScore(s => s + 10);
          setItems(prev => [...prev.filter(i => i.id !== itemId), spawnItem()]);
        } else {
          setScore(s => Math.max(0, s - 5));
          setIsShaking(true);
          setTimeout(() => setIsShaking(false), 400);
        }
      };

      return (
        <div className="min-h-screen flex flex-col p-4 md:p-8 font-sans">
          <header className="max-w-4xl mx-auto w-full flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-lg border-b-4 border-slate-200">
            <h1 className="text-2xl font-black text-emerald-600">ECO-SORTER</h1>
            <div className="flex gap-6">
              <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase">Time</p><p className="text-xl font-black">{timeLeft}s</p></div>
              <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase">Score</p><p className="text-xl font-black text-blue-600">{score}</p></div>
            </div>
          </header>

          <main className="flex-grow max-w-4xl mx-auto w-full flex flex-col items-center">
            <AnimatePresence mode="wait">
              {isGameOver ? (
                <GameOver score={score} rankings={rankings} onSave={saveScore} />
              ) : (
                <div className={`w-full ${isShaking ? 'animate-shake' : ''}`}>
                  <div className="flex justify-center gap-4 mb-12">
                    {['Organic', 'Recyclable', 'Hazardous'].map(type => (
                      <div 
                        key={type}
                        onDragOver={e => e.preventDefault()}
                        onDrop={e => handleSort(e.dataTransfer.getData("id"), type)}
                        className={`w-24 h-32 md:w-32 md:h-40 rounded-t-3xl flex flex-col items-center justify-center text-white font-bold shadow-xl transition-all hover:scale-105 ${type==='Organic'?'bg-emerald-500':type==='Recyclable'?'bg-sky-500':'bg-rose-500'}`}
                      >
                        <span className="text-3xl mb-1">🗑️</span>
                        <span className="text-xs md:text-sm uppercase tracking-tighter">{type}</span>
                      </div>
                    ))}
                  </div>

                  <div className="flex flex-wrap justify-center gap-4 min-h-[150px]">
                    <AnimatePresence>
                      {items.map(item => (
                        <motion.div
                          key={item.id} layout initial={{ scale: 0 }} animate={{ scale: 1 }} exit={{ scale: 0 }}
                          draggable onDragStart={e => e.dataTransfer.setData("id", item.id)}
                          className="bg-white p-6 rounded-2xl shadow-lg border-2 border-slate-100 cursor-grab active:cursor-grabbing text-center"
                        >
                          <span className="text-4xl block mb-2">{item.icon}</span>
                          <span className="font-bold text-slate-700">{item.name}</span>
                        </motion.div>
                      ))}
                    </AnimatePresence>
                  </div>
                </div>
              )}
            </AnimatePresence>
          </main>

          <footer className="text-center py-8 text-slate-400 text-xs">
            <p>© 2026 Copyright | พัฒนาโดย <strong>Parinya Boonsattha</strong></p>
          </footer>
        </div>
      );
    }

    function GameOver({ score, rankings, onSave }) {
      const [name, setName] = useState("");
      const [saved, setSaved] = useState(false);

      return (
        <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full border-t-8 border-emerald-500">
          <h2 className="text-4xl font-black text-slate-800 mb-2">Time Up!</h2>
          <p className="text-slate-500 mb-6">Score: <span className="text-2xl font-bold text-emerald-500">{score}</span></p>
          
          {!saved ? (
            <div className="space-y-3 mb-6">
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Your Name" className="w-full p-3 rounded-xl border-2 border-slate-100 text-center outline-none focus:border-emerald-400" />
              <button onClick={() => { onSave(name); setSaved(true); }} className="w-full bg-emerald-500 text-white p-3 rounded-xl font-bold hover:bg-emerald-600 shadow-lg shadow-emerald-100 transition-all">บันทึกสถิติ</button>
            </div>
          ) : (
            <div className="mb-6 bg-slate-50 p-4 rounded-2xl text-left">
              <h3 className="text-center font-black text-xs text-slate-400 mb-3 uppercase tracking-widest">Global Rankings</h3>
              {rankings.map((r, i) => (
                <div key={i} className="flex justify-between py-1.5 border-b border-slate-100 last:border-0">
                  <span className="font-bold text-slate-600 text-sm">{i+1}. {r.name}</span>
                  <span className="font-black text-emerald-600 text-sm">{r.score}</span>
                </div>
              ))}
            </div>
          )}
          <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-emerald-500 font-bold text-sm">Play Again</button>
        </motion.div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
