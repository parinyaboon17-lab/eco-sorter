<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eco-Sorter 2026 | Mobile Ready</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .animate-shake { animation: shake 0.2s ease-in-out 2; }
    body { 
        background: radial-gradient(circle at center, #f8fafc, #e2e8f0); 
        overflow-x: hidden;
        overscroll-behavior-y: contain; /* กันดึงหน้าจอลงเพื่อ refresh บนมือถือ */
    }
    .touch-none { touch-action: none; } /* สำคัญมากสำหรับการลากบนมือถือ */
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const { motion, AnimatePresence } = FramerMotion;

    // เปลี่ยน URL ตรงนี้เป็นลิงก์ที่ได้จากการ Deploy Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbwVy1shvC4dk_SJnmk0ZnR8amiufwJNGCjQeRnvKSrwtBex87GN3zcUpoAEg2MnMggX/exec";

    const WASTE_POOL = [
      { name: 'Apple', type: 'Organic', icon: '🍎' },
      { name: 'Bottle', type: 'Recyclable', icon: '🧴' },
      { name: 'Battery', type: 'Hazardous', icon: '🔋' },
      { name: 'Can', type: 'Recyclable', icon: '🥫' },
      { name: 'Banana', type: 'Organic', icon: '🍌' },
      { name: 'Light Bulb', type: 'Hazardous', icon: '💡' }
    ];

    // เช็คว่าตำแหน่งที่ปล่อยนิ้ว/เมาส์ อยู่บนถังขยะหรือไม่
    const isOverElement = (point, element) => {
      if (!element) return false;
      const rect = element.getBoundingClientRect();
      return (
        point.x >= rect.left &&
        point.x <= rect.right &&
        point.y >= rect.top &&
        point.y <= rect.bottom
      );
    };

    function App() {
      const [items, setItems] = useState([]);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(30);
      const [isGameOver, setIsGameOver] = useState(false);
      const [rankings, setRankings] = useState([]);
      const [isShaking, setIsShaking] = useState(false);
      const binRefs = useRef({});

      const fetchRankings = useCallback(async () => {
        try {
          const res = await fetch(API_URL);
          const data = await res.json();
          setRankings(Array.isArray(data) ? data : []);
        } catch (e) { 
          console.error("Ranking API Error", e);
          setRankings([]); 
        }
      }, []);

      const saveScore = async (name) => {
        try {
          const res = await fetch(`${API_URL}?action=save&name=${encodeURIComponent(name)}&score=${score}`);
          const data = await res.json();
          setRankings(data);
        } catch (e) { console.error("Save Score Error", e); }
      };

      const spawnItem = useCallback(() => {
        const rand = WASTE_POOL[Math.floor(Math.random() * WASTE_POOL.length)];
        return { ...rand, id: Math.random().toString(36).substr(2, 9) };
      }, []);

      useEffect(() => {
        setItems(Array.from({ length: 3 }).map(() => spawnItem()));
        fetchRankings();
      }, [spawnItem, fetchRankings]);

      useEffect(() => {
        if (timeLeft > 0 && !isGameOver) {
          const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
          return () => clearInterval(timer);
        } else if (timeLeft === 0) {
          setIsGameOver(true);
          confetti({ particleCount: 150, spread: 70 });
        }
      }, [timeLeft, isGameOver]);

      const handleSort = (itemId, type) => {
        const item = items.find(i => i.id === itemId);
        if (item && item.type === type) {
          setScore(s => s + 10);
          setItems(prev => [...prev.filter(i => i.id !== itemId), spawnItem()]);
        } else {
          setScore(s => Math.max(0, s - 5));
          setIsShaking(true);
          setTimeout(() => setIsShaking(false), 400);
        }
      };

      const onDragEnd = (event, info, itemId) => {
        const dropPoint = { x: info.point.x, y: info.point.y };
        let detectedType = null;

        ['Organic', 'Recyclable', 'Hazardous'].forEach(type => {
          if (isOverElement(dropPoint, binRefs.current[type])) {
            detectedType = type;
          }
        });

        if (detectedType) {
          handleSort(itemId, detectedType);
        }
      };

      return (
        <div className="min-h-screen flex flex-col p-4 md:p-8 font-sans select-none">
          <header className="max-w-4xl mx-auto w-full flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-lg border-b-4 border-slate-200">
            <h1 className="text-xl md:text-2xl font-black text-emerald-600">ECO-SORTER</h1>
            <div className="flex gap-4 md:gap-6">
              <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase">Time</p><p className="text-lg md:text-xl font-black">{timeLeft}s</p></div>
              <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase">Score</p><p className="text-lg md:text-xl font-black text-blue-600">{score}</p></div>
            </div>
          </header>

          <main className="flex-grow max-w-4xl mx-auto w-full flex flex-col items-center">
            <AnimatePresence mode="wait">
              {isGameOver ? (
                <GameOver score={score} rankings={rankings} onSave={saveScore} />
              ) : (
                <div className={`w-full ${isShaking ? 'animate-shake' : ''}`}>
                  <div className="flex justify-center gap-4 mb-16">
                    {['Organic', 'Recyclable', 'Hazardous'].map(type => (
                      <div 
                        key={type}
                        ref={el => binRefs.current[type] = el}
                        className={`w-24 h-32 md:w-32 md:h-40 rounded-t-3xl flex flex-col items-center justify-center text-white font-bold shadow-xl ${type==='Organic'?'bg-emerald-500':type==='Recyclable'?'bg-sky-500':'bg-rose-500'}`}
                      >
                        <span className="text-3xl mb-1 pointer-events-none">🗑️</span>
                        <span className="text-[10px] md:text-sm uppercase tracking-tighter pointer-events-none">{type}</span>
                      </div>
                    ))}
                  </div>

                  <div className="flex flex-wrap justify-center gap-6 min-h-[160px] relative">
                    <AnimatePresence shadow>
                      {items.map(item => (
                        <motion.div
                          key={item.id}
                          layout
                          initial={{ scale: 0 }}
                          animate={{ scale: 1 }}
                          exit={{ scale: 0 }}
                          drag
                          dragConstraints={{ left: 0, right: 0, top: 0, bottom: 0 }}
                          dragElastic={0.7}
                          whileDrag={{ scale: 1.2, zIndex: 50 }}
                          onDragEnd={(e, info) => onDragEnd(e, info, item.id)}
                          className="bg-white p-6 rounded-2xl shadow-lg border-2 border-slate-100 cursor-grab active:cursor-grabbing text-center touch-none w-28 md:w-32"
                        >
                          <span className="text-4xl block mb-2 pointer-events-none">{item.icon}</span>
                          <span className="font-bold text-slate-700 pointer-events-none text-sm">{item.name}</span>
                        </motion.div>
                      ))}
                    </AnimatePresence>
                  </div>
                </div>
              )}
            </AnimatePresence>
          </main>

          <footer className="text-center py-8 text-slate-400 text-[10px]">
            <p>© 2026 Copyright | พัฒนาโดย <strong>Parinya Boonsattha</strong></p>
          </footer>
        </div>
      );
    }

    function GameOver({ score, rankings, onSave }) {
      const [name, setName] = useState("");
      const [saved, setSaved] = useState(false);

      return (
        <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full border-t-8 border-emerald-500 mx-auto">
          <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2">Time Up!</h2>
          <p className="text-slate-500 mb-6">คะแนนของคุณ: <span className="text-2xl font-bold text-emerald-500">{score}</span></p>
          
          {!saved ? (
            <div className="space-y-3 mb-6">
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="ใส่ชื่อของคุณ" className="w-full p-3 rounded-xl border-2 border-slate-100 text-center outline-none focus:border-emerald-400" />
              <button onClick={() => { if(name) { onSave(name); setSaved(true); } }} className="w-full bg-emerald-500 text-white p-3 rounded-xl font-bold hover:bg-emerald-600 shadow-lg shadow-emerald-100 transition-all">บันทึกสถิติ</button>
            </div>
          ) : (
            <div className="mb-6 bg-slate-50 p-4 rounded-2xl text-left max-h-48 overflow-y-auto">
              <h3 className="text-center font-black text-[10px] text-slate-400 mb-3 uppercase tracking-widest">Global Rankings</h3>
              {rankings.length > 0 ? rankings.map((r, i) => (
                <div key={i} className="flex justify-between py-1.5 border-b border-slate-100 last:border-0">
                  <span className="font-bold text-slate-600 text-sm">{i+1}. {r.name}</span>
                  <span className="font-black text-emerald-600 text-sm">{r.score}</span>
                </div>
              )) : <p className="text-center text-xs text-slate-400">กำลังโหลดอันดับ...</p>}
            </div>
          )}
          <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-emerald-500 font-bold text-sm">เล่นอีกครั้ง</button>
        </motion.div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
